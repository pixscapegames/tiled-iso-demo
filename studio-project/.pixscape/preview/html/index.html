<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pixscape HTML Preview</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    html, body, #embed-html {
      position: fixed;
      inset: 0;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    canvas {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      display: block;
      z-index: 1;
      outline: none;
}
  </style>
</head>

<body>
<div id="embed-html"></div>

<script>
  function focusGameCanvas(evt) {
    var root = document.getElementById('embed-html');
    var canvas = root ? root.querySelector('canvas') : document.querySelector('canvas');

    if (canvas) {
      canvas.setAttribute('tabindex', '0');
      canvas.focus();
    }

    if (evt) {
      evt.preventDefault();
      evt.stopPropagation();
    }
  }

  function blockPreviewKeys(evt) {
    var keys = [
      'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
      '+', '-', '=', 'F9'
    ];

    if (keys.indexOf(evt.key) >= 0) {
      evt.preventDefault();
      evt.stopPropagation();
    }
  }

  window.addEventListener('load', function () {
    var root = document.getElementById('embed-html');

    if (root) {
      root.addEventListener('mousedown', focusGameCanvas, false);
      root.addEventListener('mouseup', function (evt) {
        evt.preventDefault();
        evt.stopPropagation();
      }, false);
    }

    document.addEventListener('keydown', blockPreviewKeys, false);
    document.addEventListener('keyup', blockPreviewKeys, false);
  });
</script>

<script src="htmlplayer/htmlplayer.nocache.js"></script>
</body>
</html>
